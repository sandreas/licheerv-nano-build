image boot.vfat {
    vfat {
        files = {
            "Image",
            "sg2002-licheerv-nano.dtb",
            "extlinux.conf"
        }
    }
    size = 64M
}

image sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition spl {
        in-partition-table = false
        image = "u-boot-spl.bin"
        offset = 8K
    }

    partition uboot {
        in-partition-table = false
        image = "u-boot.bin"
        offset = 256K
    }

    partition boot {
        partition-type = 0x0C
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
